name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cc: gcc-13, cxx: g++-13, pkg: g++-13 }
          - { cc: gcc-14, cxx: g++-14, pkg: g++-14 }
          - { cc: clang-17, cxx: clang++-17, pkg: clang-17 }
          - { cc: clang-18, cxx: clang++-18, pkg: clang-18 }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ${{ matrix.compiler.pkg }} cmake ninja-build pkg-config

      - name: Configure
        env:
          CC: ${{ matrix.compiler.cc }}
          CXX: ${{ matrix.compiler.cxx }}
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset release --output-on-failure

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install deps
        run: brew install cmake ninja pkg-config

      - name: Configure
        run: cmake --preset ci

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset release --output-on-failure

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ci -G "Ninja"

      - name: Build
        run: cmake --build --preset ci

      - name: Test
        run: ctest --preset release --output-on-failure

  sanitizers:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: [asan, ubsan]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++-14 cmake ninja-build pkg-config

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure
