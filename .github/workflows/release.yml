name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: nift-linux-x86_64
            ext: tar.gz
          - os: macos-latest
            artifact: nift-macos-arm64
            ext: tar.gz
          - os: windows-latest
            artifact: nift-windows-x86_64
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup MSVC env (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake --preset release -DNIFT_STATIC_LINK=ON

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        # Homebrew cmake 4.x FindThreads regression — manually set the cache vars
        run: |
          cat > /tmp/ThreadsInit.cmake << 'EOF'
          set(CMAKE_THREAD_LIBS_INIT "" CACHE STRING "")
          set(CMAKE_HAVE_THREADS_LIBRARY ON CACHE BOOL "")
          set(CMAKE_USE_WIN32_THREADS_INIT OFF CACHE BOOL "")
          set(CMAKE_USE_PTHREADS_INIT ON CACHE BOOL "")
          set(THREADS_FOUND TRUE CACHE BOOL "")
          set(Threads_FOUND TRUE CACHE BOOL "")
          set(CMAKE_HAVE_LIBC_PTHREAD ON CACHE BOOL "macOS has pthreads in libSystem")
          EOF
          cmake -C /tmp/ThreadsInit.cmake --preset release \
            -DCMAKE_THREAD_LIBS_INIT="" \
            -DTHREADS_FOUND=TRUE

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        env:
          CC: cl
          CXX: cl
        shell: pwsh
        run: |
          cmake --preset release

      - name: Build
        run: cmake --build --preset release -j

      - name: Test
        run: ctest --preset release --output-on-failure

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd build/release/apps/nift
          tar czf ../../../../${{ matrix.artifact }}.${{ matrix.ext }} nift

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/release/apps/nift/nift.exe -DestinationPath ${{ matrix.artifact }}.${{ matrix.ext }}

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip